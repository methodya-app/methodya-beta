services:
  mongo:
    image: mongo:7
    container_name: methodya-mongo-local
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: methodya
    volumes:
      - methodya_mongo_data:/data/db

  mongo-express:
    image: mongo-express:1
    container_name: methodya-mongo-express
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: 'false'

volumes:
  methodya_mongo_data:
